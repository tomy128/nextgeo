<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>
  
  <!-- Base background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  
  <!-- Globe / Orbit -->
  <ellipse cx="256" cy="256" rx="180" ry="80" fill="none" stroke="url(#primary)" stroke-width="24" transform="rotate(-30 256 256)" opacity="0.8" />
  <ellipse cx="256" cy="256" rx="80" ry="180" fill="none" stroke="url(#accent)" stroke-width="24" transform="rotate(-30 256 256)" opacity="0.8" />
  
  <!-- Letter N -->
  <path d="M 190 340 L 190 170 L 320 340 L 320 170" fill="none" stroke="#FFFFFF" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
</svg>
